<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>方太 · 职前 AI 课程设计工作台</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* =====================================================
   方太 · 职前 AI 课程设计工作台
   设计语言：新中式现代轻奢
   主色：宣纸白 + 墨黑 + 朱砂红 + 翠青 + 暖金
   ===================================================== */

:root {
  /* 纸张色系 */
  --paper:        #F6F1E7;   /* 主背景：宣纸米白 */
  --paper-deep:   #ECE4D2;   /* 次背景：浅米褐 */
  --paper-soft:   #FAF7F0;   /* 卡片底色 */
  --paper-warm:   #F2EBDC;   /* 暖白 */

  /* 墨色系 */
  --ink-900:      #14110D;   /* 主文字 */
  --ink-700:      #2C2823;
  --ink-500:      #5A5247;
  --ink-400:      #7A7065;
  --ink-300:      #A89E91;
  --ink-200:      #C9BFB1;
  --ink-100:      #E2DACB;

  /* 主强调色系 */
  --vermilion:    #B83A2A;   /* 朱砂红 - 主品牌色 */
  --vermilion-d:  #8E2A1E;
  --vermilion-l:  #D97062;
  --vermilion-bg: rgba(184, 58, 42, 0.08);

  /* 辅助色 */
  --jade:         #4A7568;   /* 翠青 */
  --jade-l:       #7BA597;
  --jade-bg:      rgba(74, 117, 104, 0.10);

  --gold:         #B8915A;   /* 暖金 */
  --gold-l:       #D6B47A;
  --gold-bg:      rgba(184, 145, 90, 0.12);

  --indigo:       #2F4858;   /* 深靛蓝 - 用于章节 */
  --indigo-l:     #6E8A9A;

  /* 状态 */
  --success:      #4A7568;
  --warn:         #C8902F;
  --danger:       #B83A2A;

  /* 排版 */
  --serif: 'Noto Serif SC', 'STSong', 'SimSun', serif;
  --sans:  'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --mono:  'JetBrains Mono', 'SF Mono', Consolas, monospace;

  /* 阴影 */
  --shadow-sm: 0 1px 2px rgba(28, 22, 14, 0.04);
  --shadow:    0 2px 8px rgba(28, 22, 14, 0.06), 0 1px 2px rgba(28, 22, 14, 0.04);
  --shadow-md: 0 4px 20px rgba(28, 22, 14, 0.08), 0 2px 6px rgba(28, 22, 14, 0.04);
  --shadow-lg: 0 12px 40px rgba(28, 22, 14, 0.12), 0 4px 12px rgba(28, 22, 14, 0.06);

  /* 圆角 */
  --r-sm: 4px;
  --r:    8px;
  --r-md: 12px;
  --r-lg: 16px;
}

/* ========== Reset ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink-900);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'kern', 'liga', 'calt';
}

/* 背景纹理 - 仿宣纸纤维 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(at 20% 20%, rgba(184, 58, 42, 0.03) 0px, transparent 50%),
    radial-gradient(at 80% 60%, rgba(74, 117, 104, 0.03) 0px, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
}

input, textarea {
  font-family: inherit;
  border: none;
  outline: none;
  background: none;
}

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--ink-200);
  border-radius: 4px;
  border: 2px solid var(--paper);
}
::-webkit-scrollbar-thumb:hover { background: var(--ink-300); }

/* ========== Layout ========== */
.app {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 248px 1fr 360px;
  height: 100vh;
  background: var(--paper);
}

/* ========== Sidebar ========== */
.sidebar {
  background: var(--paper-deep);
  border-right: 1px solid var(--ink-100);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sb-brand {
  padding: 28px 24px 24px;
  border-bottom: 1px solid var(--ink-100);
  position: relative;
}

.sb-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 6px;
}

.sb-seal {
  display: none;
}

.sb-seal::after {
  display: none;
}

.sb-logo-img {
  width: 48px;
  height: 48px;
  object-fit: contain;
  flex-shrink: 0;
  background: var(--paper-soft);
  border-radius: 6px;
  padding: 2px;
}

.sb-brand-text {
  display: flex;
  flex-direction: column;
}

.sb-name {
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 600;
  color: var(--ink-900);
  letter-spacing: 0.5px;
}

.sb-en {
  font-family: var(--sans);
  font-size: 10px;
  color: var(--ink-400);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 2px;
}

.sb-meta {
  margin-top: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--ink-500);
}

.sb-meta-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 0 3px rgba(74, 117, 104, 0.18);
}

.sb-meta-tag {
  padding: 2px 8px;
  background: var(--vermilion-bg);
  color: var(--vermilion);
  font-weight: 500;
  border-radius: 3px;
  font-size: 10.5px;
  letter-spacing: 0.5px;
}

/* Sidebar nav */
.sb-nav {
  flex: 1;
  padding: 20px 14px;
  overflow-y: auto;
}

.sb-nav-section {
  font-family: var(--serif);
  font-size: 11px;
  color: var(--ink-400);
  letter-spacing: 4px;
  padding: 0 12px;
  margin-bottom: 10px;
}

.sb-nav-item {
  position: relative;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  margin-bottom: 2px;
  cursor: pointer;
  font-size: 13.5px;
  color: var(--ink-500);
  border-radius: var(--r);
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.sb-nav-item:hover {
  background: rgba(20, 17, 13, 0.04);
  color: var(--ink-900);
}

.sb-nav-item.active {
  background: var(--paper-soft);
  color: var(--ink-900);
  font-weight: 500;
  box-shadow: var(--shadow-sm);
}

.sb-nav-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 18px;
  background: var(--vermilion);
  border-radius: 0 2px 2px 0;
}

.sb-nav-num {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-300);
  width: 18px;
  text-align: center;
}

.sb-nav-item.active .sb-nav-num { color: var(--vermilion); }

.sb-nav-icon {
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.sb-nav-icon svg {
  width: 16px;
  height: 16px;
  stroke-width: 1.6;
}

.sb-nav-label {
  flex: 1;
}

.sb-nav-badge {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 7px;
  background: var(--ink-100);
  color: var(--ink-500);
  border-radius: 3px;
  font-weight: 500;
}

.sb-nav-item.active .sb-nav-badge {
  background: var(--vermilion);
  color: #FCE6D5;
}

.sb-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--ink-100);
  background: var(--paper-warm);
}

.sb-countdown-label {
  font-family: var(--serif);
  font-size: 10px;
  color: var(--ink-400);
  letter-spacing: 3px;
  margin-bottom: 6px;
}

.sb-countdown {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
  color: var(--vermilion);
  letter-spacing: 1px;
  line-height: 1;
}

.sb-countdown-sub {
  font-size: 11px;
  color: var(--ink-500);
  margin-top: 4px;
}

/* ========== Main ========== */
.main {
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

.main-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid var(--ink-100);
  background: var(--paper);
  flex-shrink: 0;
}

.main-title-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
}

.main-title-chap {
  font-family: var(--serif);
  font-size: 11px;
  color: var(--vermilion);
  letter-spacing: 6px;
  padding: 4px 10px;
  border: 1px solid var(--vermilion);
  border-radius: 2px;
}

.main-title {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
  color: var(--ink-900);
  letter-spacing: 1px;
}

.main-actions {
  display: flex;
  gap: 10px;
  align-items: center;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--r);
  font-size: 13px;
  color: var(--ink-700);
  background: var(--paper-soft);
  border: 1px solid var(--ink-100);
  transition: all 0.18s;
  font-family: var(--sans);
}

.btn:hover {
  background: var(--paper-warm);
  border-color: var(--ink-200);
  transform: translateY(-1px);
}

.btn svg { width: 14px; height: 14px; }

.btn-primary {
  background: var(--vermilion);
  color: #FCE6D5;
  border-color: var(--vermilion);
}

.btn-primary:hover {
  background: var(--vermilion-d);
  border-color: var(--vermilion-d);
  box-shadow: 0 4px 12px rgba(184, 58, 42, 0.25);
}

.btn-ghost {
  background: transparent;
  border-color: transparent;
  color: var(--ink-500);
}

.btn-ghost:hover {
  background: var(--paper-warm);
  color: var(--ink-900);
}

/* Content area */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 36px 56px 80px;
  position: relative;
}

.content-inner {
  max-width: 820px;
  margin: 0 auto;
}

/* ========== Right Panel ========== */
.panel {
  background: var(--paper-deep);
  border-left: 1px solid var(--ink-100);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--ink-100);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.panel-title {
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 600;
  color: var(--ink-900);
  letter-spacing: 1px;
}

.panel-title-deco {
  display: flex;
  align-items: center;
  gap: 8px;
}

.panel-title-deco::before {
  content: '';
  width: 16px;
  height: 1px;
  background: var(--vermilion);
}

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

/* ========== Components: Section ========== */
.section {
  margin-bottom: 48px;
  animation: fadeUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) backwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-head {
  display: flex;
  align-items: flex-end;
  gap: 16px;
  margin-bottom: 22px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--ink-100);
  position: relative;
}

.section-head::after {
  content: '';
  position: absolute;
  left: 0;
  bottom: -1px;
  width: 60px;
  height: 1px;
  background: var(--vermilion);
}

.section-num {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 700;
  color: var(--vermilion);
  line-height: 1;
  letter-spacing: -1px;
  font-feature-settings: 'tnum';
}

.section-title {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 600;
  color: var(--ink-900);
  letter-spacing: 1px;
  line-height: 1.2;
}

.section-sub {
  font-size: 12px;
  color: var(--ink-400);
  margin-bottom: 4px;
  letter-spacing: 1px;
}

/* ========== Card ========== */
.card {
  background: var(--paper-soft);
  border: 1px solid var(--ink-100);
  border-radius: var(--r-md);
  padding: 24px;
  margin-bottom: 16px;
  position: relative;
  transition: all 0.2s;
}

.card:hover {
  border-color: var(--ink-200);
  box-shadow: var(--shadow);
}

.card-paper {
  background: var(--paper-warm);
  border-color: var(--ink-100);
}

.card-deco {
  position: absolute;
  top: 0;
  left: 24px;
  width: 32px;
  height: 2px;
  background: var(--vermilion);
  border-radius: 0 0 2px 2px;
}

.card-deco::after {
  content: '';
  position: absolute;
  top: 6px;
  left: 0;
  width: 8px;
  height: 1px;
  background: var(--gold);
}

/* ========== Notif Card ========== */
.notif-preview {
  background: linear-gradient(180deg, var(--paper-soft) 0%, var(--paper-warm) 100%);
  border: 1px solid var(--ink-100);
  border-radius: var(--r-md);
  padding: 32px 36px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}

.notif-preview::before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle at top right, rgba(184, 58, 42, 0.08), transparent 70%);
  pointer-events: none;
}

.notif-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  font-size: 11px;
  color: var(--ink-500);
  letter-spacing: 1px;
}

.notif-meta-sep { color: var(--ink-200); }

.notif-subject {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 600;
  color: var(--ink-900);
  margin-bottom: 18px;
  letter-spacing: 0.5px;
  line-height: 1.5;
}

.notif-body {
  font-size: 14px;
  line-height: 1.95;
  color: var(--ink-700);
  font-family: var(--sans);
}

.notif-body p { margin-bottom: 14px; }

.notif-body strong {
  color: var(--ink-900);
  font-weight: 600;
}

.notif-body ul {
  list-style: none;
  margin: 10px 0 14px 4px;
}

.notif-body ul li {
  position: relative;
  padding-left: 22px;
  margin-bottom: 6px;
}

.notif-body ul li::before {
  content: '';
  position: absolute;
  left: 4px;
  top: 11px;
  width: 8px;
  height: 1px;
  background: var(--vermilion);
}

.notif-quote {
  font-family: var(--serif);
  border-left: 2px solid var(--gold);
  padding-left: 14px;
  margin: 14px 0;
  color: var(--ink-500);
  font-style: italic;
}

.notif-divider {
  border: none;
  border-top: 1px dashed var(--ink-200);
  margin: 22px 0;
  position: relative;
}

.notif-divider::after {
  content: '❀';
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  background: var(--paper-soft);
  padding: 0 10px;
  color: var(--vermilion);
  font-size: 12px;
}

/* Editable textarea */
.editable-wrap {
  position: relative;
  background: var(--paper-soft);
  border: 1px solid var(--ink-100);
  border-radius: var(--r-md);
  padding: 20px;
  transition: border 0.2s;
}

.editable-wrap:focus-within {
  border-color: var(--vermilion-l);
  box-shadow: 0 0 0 3px var(--vermilion-bg);
}

.editable-label {
  position: absolute;
  top: -10px;
  left: 16px;
  background: var(--paper);
  padding: 0 10px;
  font-family: var(--serif);
  font-size: 11px;
  color: var(--vermilion);
  letter-spacing: 2px;
}

.editable {
  width: 100%;
  min-height: 320px;
  background: transparent;
  color: var(--ink-900);
  font-family: var(--sans);
  font-size: 13.5px;
  line-height: 1.85;
  resize: vertical;
}

.editable-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed var(--ink-100);
}

.editable-charcount {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-400);
}

/* ========== Questionnaire ========== */
.q-section {
  background: var(--paper-soft);
  border: 1px solid var(--ink-100);
  border-radius: var(--r-md);
  padding: 26px 28px;
  margin-bottom: 20px;
  position: relative;
}

.q-section-head {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--ink-100);
}

.q-section-num {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 700;
  color: var(--vermilion);
  line-height: 1;
  width: 38px;
  text-align: center;
  border-right: 1px solid var(--ink-100);
  padding-right: 14px;
}

.q-section-title {
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 600;
  color: var(--ink-900);
  letter-spacing: 1px;
}

.q-section-sub {
  font-size: 11.5px;
  color: var(--ink-400);
  margin-top: 2px;
  letter-spacing: 0.5px;
}

.q-list { display: flex; flex-direction: column; gap: 12px; }

.q-card {
  display: flex;
  gap: 16px;
  padding: 16px 18px;
  background: var(--paper);
  border: 1px solid var(--ink-100);
  border-radius: var(--r);
  transition: all 0.18s;
}

.q-card:hover {
  border-color: var(--vermilion-l);
  background: var(--paper-soft);
}

.q-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--vermilion);
  background: var(--vermilion-bg);
  padding: 3px 8px;
  border-radius: 3px;
  height: fit-content;
  font-weight: 600;
  flex-shrink: 0;
}

.q-body { flex: 1; min-width: 0; }

.q-title {
  font-size: 14px;
  color: var(--ink-900);
  font-weight: 500;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.q-type {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--jade);
  background: var(--jade-bg);
  padding: 2px 7px;
  border-radius: 3px;
  font-weight: 500;
}

.q-opts {
  font-size: 12.5px;
  color: var(--ink-500);
  line-height: 1.85;
  margin-bottom: 6px;
}

.q-opts-chip {
  display: inline-block;
  padding: 2px 9px;
  background: var(--paper-warm);
  border: 1px solid var(--ink-100);
  border-radius: 3px;
  margin: 2px 4px 2px 0;
  font-size: 11.5px;
  color: var(--ink-700);
}

.q-purpose {
  font-family: var(--serif);
  font-size: 11.5px;
  color: var(--gold);
  font-style: italic;
  margin-top: 4px;
  padding-left: 10px;
  border-left: 2px solid var(--gold-l);
}

/* ========== Course Design ========== */
.principle-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 8px;
}

.principle-card {
  display: flex;
  gap: 12px;
  padding: 14px 16px;
  background: var(--paper-soft);
  border: 1px solid var(--ink-100);
  border-radius: var(--r);
  transition: all 0.2s;
}

.principle-card:hover {
  border-color: var(--vermilion-l);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.principle-num {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 700;
  color: var(--vermilion-l);
  line-height: 1;
  font-feature-settings: 'tnum';
}

.principle-text {
  font-size: 12.5px;
  color: var(--ink-700);
  line-height: 1.6;
}

.principle-text strong {
  color: var(--ink-900);
  font-weight: 600;
}

/* Phase */
.phase-card {
  position: relative;
  background: var(--paper-soft);
  border: 1px solid var(--ink-100);
  border-radius: var(--r-md);
  padding: 24px 26px;
  margin-bottom: 18px;
  overflow: hidden;
}

.phase-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: var(--vermilion);
}

.phase-card.phase-jade::before { background: var(--jade); }
.phase-card.phase-gold::before { background: var(--gold); }

.phase-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 16px;
  gap: 16px;
  flex-wrap: wrap;
}

.phase-title-group {
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.phase-phase {
  font-family: var(--serif);
  font-size: 11px;
  color: var(--ink-400);
  letter-spacing: 4px;
}

.phase-name {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 600;
  color: var(--ink-900);
  letter-spacing: 0.5px;
}

.phase-timeline {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-500);
  padding: 4px 10px;
  background: var(--paper-warm);
  border-radius: 3px;
  border: 1px solid var(--ink-100);
}

.phase-timeline-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--vermilion);
  margin-right: 6px;
  vertical-align: 1px;
}

.module-list {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
}

.module-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 14px;
  background: var(--paper);
  border: 1px solid var(--ink-100);
  border-radius: var(--r-sm);
  font-size: 13px;
  color: var(--ink-700);
  line-height: 1.6;
  transition: all 0.18s;
}

.module-item:hover {
  background: var(--paper-warm);
  border-color: var(--ink-200);
}

.module-icon {
  width: 18px;
  height: 18px;
  background: var(--vermilion-bg);
  color: var(--vermilion);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-family: var(--serif);
  font-weight: 700;
  flex-shrink: 0;
}

.module-item.phase-jade .module-icon { background: var(--jade-bg); color: var(--jade); }
.module-item.phase-gold .module-icon { background: var(--gold-bg); color: var(--gold); }

/* ========== Main Course Module ========== */
.main-module {
  position: relative;
  background: var(--paper-soft);
  border: 1px solid var(--ink-100);
  border-radius: var(--r-md);
  padding: 22px 24px;
  margin-bottom: 14px;
  transition: all 0.2s;
}

.main-module:hover {
  border-color: var(--ink-200);
  box-shadow: var(--shadow);
}

.main-module.adv-vermilion { border-left: 3px solid var(--vermilion); }
.main-module.adv-jade      { border-left: 3px solid var(--jade); }
.main-module.adv-gold      { border-left: 3px solid var(--gold); }

.main-module-head {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px dashed var(--ink-100);
}

.main-module-num {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 700;
  line-height: 1;
  width: 42px;
  text-align: center;
  flex-shrink: 0;
}

.main-module.adv-vermilion .main-module-num { color: var(--vermilion); }
.main-module.adv-jade      .main-module-num { color: var(--jade); }
.main-module.adv-gold      .main-module-num { color: var(--gold); }

.main-module-body { flex: 1; min-width: 0; }

.main-module-name {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 600;
  color: var(--ink-900);
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  line-height: 1.4;
}

.main-module-summary {
  font-size: 12px;
  color: var(--ink-500);
  line-height: 1.5;
}

.main-module-time {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-700);
  background: var(--paper-warm);
  border: 1px solid var(--ink-100);
  padding: 4px 10px;
  border-radius: 3px;
  white-space: nowrap;
  align-self: flex-start;
  flex-shrink: 0;
}

.main-module-points {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.main-module-points li {
  position: relative;
  padding-left: 18px;
  font-size: 13px;
  color: var(--ink-700);
  line-height: 1.7;
}

.main-module-points li::before {
  content: '';
  position: absolute;
  left: 2px;
  top: 11px;
  width: 6px;
  height: 1px;
  background: var(--ink-300);
}

.main-module-advance {
  margin-top: 12px;
  padding: 10px 14px;
  background: var(--paper-warm);
  border-left: 2px solid var(--gold);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  font-size: 12px;
  color: var(--ink-500);
  line-height: 1.6;
}

.main-module-advance::before {
  content: '进阶 → ';
  font-family: var(--serif);
  color: var(--gold);
  font-weight: 600;
  letter-spacing: 1px;
}

.course-summary-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 18px 22px;
  background: linear-gradient(135deg, var(--paper-warm), var(--paper-soft));
  border: 1px solid var(--ink-100);
  border-radius: var(--r-md);
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.course-summary-tag {
  font-family: var(--serif);
  font-size: 11px;
  color: var(--vermilion);
  letter-spacing: 3px;
  padding: 4px 10px;
  background: var(--vermilion-bg);
  border-radius: 3px;
}

.course-summary-total {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 700;
  color: var(--ink-900);
  line-height: 1;
  letter-spacing: 1px;
}

.course-summary-total small {
  font-size: 13px;
  color: var(--ink-400);
  font-weight: 400;
  margin-left: 4px;
  letter-spacing: 0;
}

.course-summary-meta {
  font-size: 12px;
  color: var(--ink-500);
  line-height: 1.6;
}

.advance-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}

.advance-chip {
  font-family: var(--sans);
  font-size: 12px;
  padding: 6px 12px;
  background: var(--gold-bg);
  color: var(--gold);
  border: 1px solid rgba(184, 145, 90, 0.3);
  border-radius: 20px;
}

.collaboration-note {
  background: var(--paper-soft);
  border: 1px dashed var(--ink-200);
  border-radius: var(--r-md);
  padding: 14px 18px;
  font-size: 12.5px;
  color: var(--ink-500);
  line-height: 1.7;
  margin-top: 8px;
}

.collaboration-note strong {
  color: var(--vermilion);
  font-weight: 600;
}

/* ========== Phase Divider (v3 案例库按阶段分组) ========== */
.phase-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 28px 0 14px;
}

.phase-divider:first-of-type {
  margin-top: 18px;
}

.phase-divider-line {
  flex: 1;
  height: 1px;
  background: var(--ink-200);
}

.phase-divider-label {
  font-family: var(--serif);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 4px;
  padding: 6px 14px;
  border-radius: 3px;
  white-space: nowrap;
}

.phase-divider.phase-vermilion .phase-divider-label {
  background: var(--vermilion-bg);
  color: var(--vermilion);
}

.phase-divider.phase-jade .phase-divider-label {
  background: var(--jade-bg);
  color: var(--jade);
}

.phase-divider.phase-gold .phase-divider-label {
  background: var(--gold-bg);
  color: var(--gold);
}

.phase-divider.phase-vermilion .phase-divider-line {
  background: linear-gradient(90deg, transparent, var(--ink-200));
}

/* ========== Main Module Meta Tags ========== */
.main-module-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}

.meta-tag {
  font-family: var(--sans);
  font-size: 11.5px;
  padding: 4px 10px;
  border-radius: 3px;
  letter-spacing: 0.3px;
  font-weight: 500;
  white-space: normal;
  display: inline-flex;
  align-items: center;
}

.meta-format {
  background: var(--paper-warm);
  color: var(--ink-500);
  border: 1px solid var(--ink-100);
}

.meta-output {
  background: var(--jade-bg);
  color: var(--jade);
  border: 1px solid rgba(74, 117, 104, 0.25);
}

.meta-final {
  background: var(--vermilion);
  color: #FCE6D5;
  border: 1px solid var(--vermilion);
  font-weight: 600;
}

.main-module.is-done .meta-final {
  background: var(--jade);
  color: #fff;
  border-color: var(--jade);
}

/* ========== Hands-on 5min 跑通 ========== */
.main-module-handson {
  margin-top: 12px;
  padding: 10px 14px;
  background: linear-gradient(135deg, var(--paper-warm), var(--paper-soft));
  border-left: 2px solid var(--gold);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  font-size: 12.5px;
  line-height: 1.6;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.handson-label {
  font-family: var(--serif);
  font-size: 11px;
  color: var(--gold);
  font-weight: 600;
  letter-spacing: 1.5px;
  padding: 3px 8px;
  background: var(--gold-bg);
  border-radius: 3px;
  white-space: nowrap;
}

.handson-text {
  color: var(--ink-700);
  flex: 1;
  min-width: 0;
}

/* ========== Overall Advice ========== */
.overall-advice {
  margin-top: 28px;
  padding: 22px 26px;
  background: linear-gradient(135deg, var(--paper-warm), var(--paper-soft));
  border: 1px solid var(--ink-100);
  border-radius: var(--r-md);
}

.overall-advice-title {
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 600;
  color: var(--vermilion);
  letter-spacing: 1.5px;
  margin-bottom: 12px;
}

.overall-advice-list {
  list-style: none;
  counter-reset: advice;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.overall-advice-list li {
  position: relative;
  padding-left: 32px;
  font-size: 13px;
  color: var(--ink-700);
  line-height: 1.7;
  counter-increment: advice;
}

.overall-advice-list li::before {
  content: counter(advice);
  position: absolute;
  left: 0;
  top: 2px;
  width: 22px;
  height: 22px;
  background: var(--vermilion-bg);
  color: var(--vermilion);
  font-family: var(--serif);
  font-size: 12px;
  font-weight: 700;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ========== Inline Edit ========== */
[contenteditable="true"] {
  outline: none;
  transition: background 0.15s, box-shadow 0.15s;
  border-radius: 3px;
  padding: 2px 4px;
  margin: -2px -4px;
}

[contenteditable="true"]:hover {
  background: rgba(184, 145, 90, 0.08);
  box-shadow: inset 0 0 0 1px rgba(184, 145, 90, 0.35);
  cursor: text;
}

[contenteditable="true"]:focus {
  background: rgba(184, 58, 42, 0.05);
  box-shadow: inset 0 0 0 1px var(--vermilion-l);
  cursor: text;
}

[contenteditable="true"]:empty::before {
  content: attr(data-placeholder);
  color: var(--ink-300);
  font-style: italic;
}

.edit-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--gold);
  background: var(--gold-bg);
  border: 1px solid rgba(184, 145, 90, 0.3);
  padding: 2px 7px;
  border-radius: 3px;
  letter-spacing: 0.5px;
  margin-left: 8px;
  vertical-align: middle;
}

.edit-badge svg {
  width: 9px;
  height: 9px;
  stroke-width: 2;
}

.point-edit-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

.point-edit-row .point-action {
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  margin-top: 4px;
  border-radius: 50%;
  background: transparent;
  border: 1px dashed var(--ink-200);
  color: var(--ink-300);
  font-size: 11px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: all 0.18s;
}

.main-module:hover .point-action,
.main-module:focus-within .point-action {
  opacity: 1;
}

.point-action:hover {
  background: var(--vermilion);
  color: #fff;
  border-color: var(--vermilion);
  opacity: 1;
}

.add-point-btn {
  margin-top: 10px;
  padding: 8px 14px;
  background: transparent;
  border: 1px dashed var(--ink-200);
  border-radius: var(--r-sm);
  color: var(--ink-400);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  gap: 6px;
  width: 100%;
  justify-content: center;
}

.add-point-btn:hover {
  background: var(--paper-warm);
  border-color: var(--vermilion-l);
  color: var(--vermilion);
  border-style: solid;
}

/* Save indicator */
.save-indicator {
  position: fixed;
  top: 80px;
  right: 32px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--paper-soft);
  border: 1px solid var(--jade-l);
  border-radius: 20px;
  font-size: 11px;
  color: var(--jade);
  font-family: var(--mono);
  z-index: 100;
  opacity: 0;
  transform: translateY(-10px);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
  box-shadow: var(--shadow);
}

.save-indicator.show {
  opacity: 1;
  transform: translateY(0);
}

.save-indicator::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--jade);
  box-shadow: 0 0 0 3px rgba(74, 117, 104, 0.18);
}

/* Confirm bar (course tab only) */
.confirm-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 20px;
  background: linear-gradient(135deg, var(--paper-warm), var(--paper-soft));
  border: 1px solid var(--ink-100);
  border-radius: var(--r-md);
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.confirm-bar-left {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  min-width: 240px;
}

.confirm-checkbox {
  appearance: none;
  -webkit-appearance: none;
  width: 22px;
  height: 22px;
  border: 2px solid var(--ink-200);
  border-radius: 5px;
  background: var(--paper);
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
  transition: all 0.2s;
}

.confirm-checkbox:hover {
  border-color: var(--jade);
}

.confirm-checkbox:checked {
  background: var(--jade);
  border-color: var(--jade);
}

.confirm-checkbox:checked::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 6px;
  width: 5px;
  height: 10px;
  border: solid #fff;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

.confirm-label {
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 600;
  color: var(--ink-900);
  cursor: pointer;
  user-select: none;
}

.confirm-hint {
  font-size: 11.5px;
  color: var(--ink-400);
  line-height: 1.5;
}

.confirm-bar.confirmed {
  background: linear-gradient(135deg, var(--jade-bg), var(--paper-soft));
  border-color: var(--jade-l);
}

.confirm-bar.confirmed .confirm-label {
  color: var(--jade);
}

.confirm-bar.confirmed .confirm-checkbox {
  background: var(--jade);
  border-color: var(--jade);
}

.confirm-bar.confirmed .confirm-hint::before {
  content: '✓ ';
  color: var(--jade);
  font-weight: 700;
  margin-right: 4px;
}

/* Course confirmed lock overlay */
.course-locked-banner {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--jade-bg);
  border: 1px solid var(--jade-l);
  border-radius: var(--r-md);
  margin-bottom: 16px;
  font-size: 12.5px;
  color: var(--jade);
  font-weight: 500;
}

.course-locked-banner svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

.course-locked-banner strong {
  color: var(--ink-900);
}

.course-locked-banner button {
  margin-left: auto;
  padding: 4px 12px;
  background: transparent;
  border: 1px solid var(--jade);
  border-radius: var(--r-sm);
  color: var(--jade);
  font-size: 11.5px;
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.18s;
}

.course-locked-banner button:hover {
  background: var(--jade);
  color: #fff;
}

/* ========== Course Progress (per-module confirmation) ========== */
.course-progress {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  padding: 18px 22px;
  background: linear-gradient(135deg, var(--paper-warm), var(--paper-soft));
  border: 1px solid var(--ink-100);
  border-radius: var(--r-md);
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.course-progress-left {
  display: flex;
  align-items: center;
  gap: 16px;
  flex: 1;
  min-width: 240px;
}

.course-progress-num {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -1px;
  display: flex;
  align-items: baseline;
  gap: 4px;
}

.course-progress-num .done-num {
  color: var(--jade);
  font-size: 40px;
}

.course-progress-num .total-num {
  color: var(--ink-300);
  font-size: 22px;
  font-weight: 500;
}

.course-progress-meta {
  flex: 1;
  min-width: 200px;
}

.course-progress-title {
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 600;
  color: var(--ink-900);
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.course-progress-hint {
  font-size: 11.5px;
  color: var(--ink-500);
  line-height: 1.5;
}

.course-progress-bar {
  width: 160px;
  height: 6px;
  background: var(--ink-100);
  border-radius: 3px;
  overflow: hidden;
  flex-shrink: 0;
}

.course-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--jade), var(--jade-l));
  border-radius: 3px;
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Per-module confirmation */
.main-module-confirm {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding: 10px 14px;
  background: var(--paper-warm);
  border: 1px dashed var(--ink-200);
  border-radius: var(--r-sm);
  transition: all 0.18s;
}

.main-module.is-done .main-module-confirm {
  background: var(--jade-bg);
  border-color: var(--jade-l);
  border-style: solid;
}

.module-confirm-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  user-select: none;
  flex: 1;
}

.module-confirm-toggle input {
  appearance: none;
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border: 2px solid var(--ink-200);
  border-radius: 50%;
  background: var(--paper);
  cursor: pointer;
  position: relative;
  transition: all 0.2s;
  flex-shrink: 0;
}

.module-confirm-toggle input:hover {
  border-color: var(--jade);
}

.module-confirm-toggle input:checked {
  background: var(--jade);
  border-color: var(--jade);
}

.module-confirm-toggle input:checked::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 6px;
  width: 4px;
  height: 9px;
  border: solid #fff;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

.module-confirm-label {
  font-family: var(--serif);
  font-size: 12.5px;
  font-weight: 600;
  color: var(--ink-500);
  letter-spacing: 1px;
  transition: color 0.2s;
}

.module-confirm-toggle input:checked + .module-confirm-label {
  color: var(--jade);
}

.main-module.is-done .module-confirm-label {
  color: var(--jade);
}

.module-confirm-tag {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--jade);
  background: var(--paper-soft);
  border: 1px solid var(--jade-l);
  padding: 3px 9px;
  border-radius: 10px;
  font-weight: 600;
  letter-spacing: 1px;

   持久化 · 课程设计实时编辑
   部署到 GitHub Pages 后，浏览器 localStorage 会保留数据
   ===================================================== */
const STORAGE_KEY = 'fotile-ai-workstation-v1';
const COURSE_CONFIRMED_KEY = 'fotile-ai-course-confirmed-v1';
const DEFAULT_COURSE = JSON.parse(JSON.stringify(data.course));

let currentTab = 'notif';
let resetSnapshot = '';
let saveTimer = null;
let lastSavedAt = null;

function $(id) { return document.getElementById(id); }

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (saved.course) {
      // 字段级合并：保留默认结构 + 用户的修改
      data.course = { ...data.course, ...saved.course };
      // 数组逐项合并，确保新增字段不会丢
      if (saved.course.mainModules) {
        data.course.mainModules = saved.course.mainModules.map((m, i) => ({
          ...DEFAULT_COURSE.mainModules[i],
          ...m,
          points: m.points || (DEFAULT_COURSE.mainModules[i] && DEFAULT_COURSE.mainModules[i].points) || [],
        }));
      }
      if (saved.course.principles) {
        data.course.principles = saved.course.principles.map((p, i) => ({
          ...DEFAULT_COURSE.principles[i],
          ...p,
        }));
      }
      if (saved.course.phases) {
        data.course.phases = saved.course.phases.map((p, i) => ({
          ...DEFAULT_COURSE.phases[i],
          ...p,
        }));
      }
    }
    if (saved.savedAt) lastSavedAt = new Date(saved.savedAt);
  } catch (e) { console.warn('load failed', e); }
}

function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      course: data.course,
      savedAt: new Date().toISOString(),
    }));
    lastSavedAt = new Date();
    updateSaveIndicator();
  } catch (e) { console.warn('save failed', e); }
}

function debouncedSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveToStorage(), 1000);
}

function isCourseConfirmed() {
  return localStorage.getItem(COURSE_CONFIRMED_KEY) === 'true';
}

function setCourseConfirmed(v) {
  if (v) localStorage.setItem(COURSE_CONFIRMED_KEY, 'true');
  else localStorage.removeItem(COURSE_CONFIRMED_KEY);
}

/* 根据 path 更新嵌套对象，例如 'mainModules.0.name' */
function setByPath(path, value) {
  const parts = path.split('.');
  let obj = data.course;
  for (let i = 0; i < parts.length - 1; i++) {
    const k = /^\d+$/.test(parts[i]) ? parseInt(parts[i], 10) : parts[i];
    if (obj[k] === undefined) return false;
    obj = obj[k];
  }
  const lastK = /^\d+$/.test(parts[parts.length - 1]) ? parseInt(parts[parts.length - 1], 10) : parts[parts.length - 1];
  obj[lastK] = value;
  return true;
}

function getByPath(path) {
  const parts = path.split('.');
  let obj = data.course;
  for (const p of parts) {
    const k = /^\d+$/.test(p) ? parseInt(p, 10) : p;
    if (obj[k] === undefined) return '';
    obj = obj[k];
  }
  return obj;
}

}

    data.course.advanceItems.forEach((a, ai) => {

    // 三阶段体系

    data.course.phases.forEach((phase, phi) => {
      html += `<div class="phase-card phase-${phase.color}">

        updateModuleCard(mi, isDone);

        e.preventDefault();
        const mi = parseInt(btn.dataset.mi, 10);
        const mod = data.course.mainModules[mi];
        const newText = '新要点 · 点击编辑';
        mod.points.push(newText);

        // 找到对应板块的 ul，插入新的 li
        const card = document.querySelectorAll('.main-module')[mi];
        if (!card) return;
        const ul = card.querySelector('.main-module-points');

    let html = `

    html += `<div class="notif-card-flow" style="margin-top:24px">

      <div class="notif-card-flow-text">${data.partner.recruitment}</div>
    </div>`;
    html += `</section>`;
    m.innerHTML = html;
  }

  else if (currentTab === 'settings') {
    resetBtn.style.display = 'none';
    let html = `
      <section class="section">
        <div class="section-head">
          <div class="section-num">01</div>
          <div>
            <div class="section-sub">PENDING · 待确认事项</div>
            <div class="section-title">关键决策</div>
          </div>
        </div>

        <div class="settings-table">`;
    data.questionnaire.decisions.forEach(d => {
      html += `<div class="settings-row">

        <div class="settings-cell suggest">${d.suggest}</div>

    html += `</div></section>`;

    html += `
      <section class="section">
        <div class="section-head">
          <div class="section-num">02</div>
          <div>
            <div class="section-sub">EXPORT · 完整数据</div>

        <div class="card card-paper">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">
            <div style="flex:1;min-width:240px">
              <div style="font-family:var(--serif);font-size:14px;color:var(--ink-900);font-weight:600;margin-bottom:4px">
                fotile-ai-course-design.json

              <div style="font-size:12.5px;color:var(--ink-500);line-height:1.7">

              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>

/* =====================================================
   Actions
   ===================================================== */

function copyActive() {
  let text;
  if (currentTab === 'notif') {
    const ta = $('editableNotif');
    text = ta ? ta.value : data.notif.editable;
  } else {
    text = JSON.stringify(data[currentTab], null, 2);
  }
  navigator.clipboard.writeText(text).then(
    () => showToast('已复制到剪贴板'),
    () => fallbackCopy(text)
  );
}

function copyNotif() {
  const ta = $('editableNotif');
  if (!ta) return;
  navigator.clipboard.writeText(ta.value).then(
    () => showToast('文案已复制 · 可直接粘贴到飞书'),
    () => fallbackCopy(ta.value)
  );
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('已复制到剪贴板'); }
  catch(e) { showToast('复制失败，请手动选择'); }
  document.body.removeChild(ta);
}

function resetEditable() {
  if (currentTab !== 'notif') return;
  const ta = $('editableNotif');
  if (!ta) return;
  ta.value = resetSnapshot;
  ta.dispatchEvent(new Event('input'));
  showToast('已重置为原始版本');
}

function exportAll() {
  const exportData = {
    exported_at: new Date().toISOString(),
    project: '方太 · 职前 AI 课程',
    version: 'v1.0',
    ...data
  };
  const blob = new Blob([JSON.stringify(exportData, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `fotile-ai-course-design-${Date.now()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('已导出 JSON · 5 个模块全部数据');
}

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* =====================================================
   Save indicator + 课程编辑全局事件
   ===================================================== */
function updateSaveIndicator() {
  const ind = $('saveIndicator');
  if (!ind) return;
  if (lastSavedAt) {
    ind.textContent = `已自动保存 · ${formatTime(lastSavedAt)}`;
  } else {
    ind.textContent = '编辑后自动保存';
  }
  ind.classList.add('show');
  clearTimeout(updateSaveIndicator._t);
  updateSaveIndicator._t = setTimeout(() => ind.classList.remove('show'), 1800);
}

function formatTime(d) {
  if (!d) return '';
  const h = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  return `${h}:${m}`;
}

/* =====================================================
   增量更新 helper —— 避免每次都重渲染整个 mainContent
   ===================================================== */

// 顶部进度条 + banner
function updateCourseProgress() {
  const totalMods = data.course.mainModules.length;
  const doneMods = data.course.mainModules.filter(m => m.confirmed).length;
  const allDone = doneMods === totalMods;

  const doneNum = document.querySelector('.course-progress .done-num');
  if (doneNum) doneNum.textContent = String(doneMods);
  const fill = document.querySelector('.course-progress-fill');
  if (fill) fill.style.width = `${(doneMods/totalMods)*100}%`;

  const title = document.querySelector('.course-progress-title');
  if (title) title.textContent = allDone ? '课程设计已全部完成' : '案例确认进度';
  const hint = document.querySelector('.course-progress-hint');
  if (hint) {
    hint.textContent = allDone
      ? `所有板块已确认 · 改动会自动保存 · 上次保存 ${formatTime(lastSavedAt)}`
      : `每个板块可独立勾选确认 · 当前已完成 ${doneMods} / ${totalMods} 个子课程`;
  }

  // all-done banner 显隐
  const existingBanner = document.querySelector('.course-locked-banner');
  if (allDone && !existingBanner) {
    const banner = document.createElement('div');
    banner.className = 'course-locked-banner';
    banner.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <div>
        <strong>课程设计已完成</strong> · ${totalMods} 个子课程全部确认 · 数据已保存至本地浏览器
        <div style="font-size:11px;color:var(--ink-500);font-weight:400;margin-top:2px">
          仍可继续微调内容，取消任一勾选可解锁对应板块
        </div>
      </div>
    `;
    const progress = document.querySelector('.course-progress');
    if (progress && progress.parentNode) {
      progress.parentNode.insertBefore(banner, progress.nextSibling);
    }
  } else if (!allDone && existingBanner) {
    existingBanner.remove();
  }
}

// 右侧参考面板：只更新「案例确认」块，不重建整个 panel
function updateCoursePanel() {
  if (currentTab !== 'course') return;
  const panel = $('panelBody');
  if (!panel) return;

  const cTotal = data.course.mainModules.length;
  const cDone = data.course.mainModules.filter(m => m.confirmed).length;
  const cTimeTotal = data.course.mainModules.reduce((s, m) => s + (Number(m.time) || 0), 0);

  // 找「案例确认」块
  const blocks = panel.querySelectorAll('.panel-block');
  blocks.forEach(block => {
    const title = block.querySelector('.panel-block-title');
    if (title && title.textContent.trim() === '案例确认') {
      // 更新大数字
      const bigNum = block.querySelector('span[style*="font-size:28px"]');
      if (bigNum) bigNum.textContent = String(cDone);
      // 更新每行
      const rows = block.querySelectorAll('.mini-table tr');
      // 第一行是表头（板块 X / 待确认·Xmin），跳过
      // 倒数第二行是「合计」，最后一行是分隔
      const dataRows = Array.from(rows).slice(0, cTotal);
      data.course.mainModules.forEach((m, i) => {
        const tr = dataRows[i];
        if (!tr) return;
        const td = tr.querySelectorAll('td')[1];
        if (td) {
          const span = td.querySelector('span');
          if (span) {
            span.textContent = `${m.confirmed ? '✓ 已确认' : '待确认'} · ${m.time}min`;
            span.style.color = m.confirmed ? 'var(--jade)' : '';
            span.style.fontWeight = m.confirmed ? '600' : '';
          }
        }
      });
      // 合计行
      const lastDataRow = Array.from(rows).reverse().find(r => {
        const tds = r.querySelectorAll('td');
        return tds[0] && tds[0].textContent.trim() === '合计';
      });
      if (lastDataRow) {
        const td = lastDataRow.querySelectorAll('td')[1];
        if (td) td.innerHTML = `<strong>${cTimeTotal} min</strong>`;
      }
    }
  });
}

// 单个板块卡片视觉更新（不重建 contenteditable，避免焦点丢失）
function updateModuleCard(mi, isDone) {
  const card = document.querySelectorAll('.main-module')[mi];
  if (!card) return;
  card.classList.toggle('is-done', isDone);

  // 更新勾选行
  const confirmArea = card.querySelector('.main-module-confirm');
  if (confirmArea) {
    const label = confirmArea.querySelector('.module-confirm-label');
    if (label) label.textContent = isDone ? '✓ 已确认' : '确认完成';
    let tag = confirmArea.querySelector('.module-confirm-tag');
    if (isDone && !tag) {
      tag = document.createElement('span');
      tag.className = 'module-confirm-tag';
      tag.textContent = '已锁定';
      confirmArea.appendChild(tag);
    } else if (!isDone && tag) {
      tag.remove();
    }
  }
}

// 删除要点（增量更新）
function bindDeletePoint(btn) {
  if (btn._bindDel) return; // 避免重复绑定
  btn._bindDel = true;
  btn.addEventListener('click', e => {
    e.preventDefault();
    e.stopPropagation();
    const mi = parseInt(btn.dataset.mi, 10);
    const pi = parseInt(btn.dataset.pi, 10);
    const mod = data.course.mainModules[mi];
    if (!mod || mod.points.length <= 1) {
      showToast('至少保留一个要点');
      return;
    }
    mod.points.splice(pi, 1);
    saveToStorage();
    // 找到对应的 li，移除
    const li = btn.closest('li');
    if (li) li.remove();
    // 重新编号剩余 li 的 data-pi
    const card = document.querySelectorAll('.main-module')[mi];
    if (card) {
      const lis = card.querySelectorAll('.main-module-points > li');
      lis.forEach((l, idx) => {
        const delBtn = l.querySelector('[data-action="del-point"]');
        const editDiv = l.querySelector('[data-path]');
        if (delBtn) delBtn.dataset.pi = idx;
        if (editDiv) editDiv.dataset.path = `mainModules.${mi}.points.${idx}`;
      });
    }
    showToast('已删除要点');
  });
}

// 监听 contenteditable 的输入事件
document.addEventListener('input', e => {
  const el = e.target;
  if (!el.dataset || !el.dataset.path) return;
  let val = el.textContent;
  // 数字字段自动转 number
  if (['time', 'totalTime'].includes(el.dataset.path.split('.').slice(-1)[0]) ||
      el.dataset.path === 'totalTime' ||
      /mainModules\.\d+\.time$/.test(el.dataset.path)) {
    const n = parseInt(val, 10);
    if (!isNaN(n) && n >= 0) {
      setByPath(el.dataset.path, n);
    } else {
      setByPath(el.dataset.path, val.trim());
    }
  } else {
    setByPath(el.dataset.path, val);
  }
  debouncedSave();
});

// 监听回车键失焦（contenteditable 默认回车会插入换行，这里改成回车失焦）
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.dataset && e.target.dataset.path && !e.shiftKey) {
    // 单行字段回车失焦
    const isMultiline = e.target.dataset.path.includes('points.') || e.target.tagName === 'TEXTAREA';
    if (!isMultiline) {
      e.preventDefault();
      e.target.blur();
    }
  }
});

// 焦点离开时立即保存
document.addEventListener('blur', e => {
  if (e.target.dataset && e.target.dataset.path) {
    saveToStorage();
  }
}, true);

// 课程 tab 重置按钮（resetBtn 在 notif tab 时是显示的，但 course tab 我们改用另一个逻辑）
function resetCourse() {
  if (!confirm('确定要把课程设计重置回初始版本吗？所有改动将丢失。')) return;
  data.course = JSON.parse(JSON.stringify(DEFAULT_COURSE));
  localStorage.removeItem(COURSE_CONFIRMED_KEY);
  saveToStorage();
  renderMain();
  renderPanel();
  showToast('已重置为初始版本');
}

/* =====================================================
   倒计时
   ===================================================== */
function updateCountdown() {
  const target = new Date('2026-07-10T24:00:00+08:00').getTime();
  const now = Date.now();
  let diff = Math.max(0, target - now);
  const days = Math.floor(diff / (1000*60*60*24));
  diff -= days * (1000*60*60*24);
  const hours = Math.floor(diff / (1000*60*60));
  $('countdown').innerHTML = `${days}<span style="font-size:13px;color:var(--ink-400);margin:0 4px">天</span>${String(hours).padStart(2,'0')}<span style="font-size:13px;color:var(--ink-400);margin:0 4px">时</span>`;
}

/* =====================================================
   Helpers
   ===================================================== */
function romanize(n) {
  return ['Ⅰ','Ⅱ','Ⅲ','Ⅳ','Ⅴ','Ⅵ','Ⅶ','Ⅷ','Ⅸ','Ⅹ'][n-1] || n;
}

loadFromStorage();

document.querySelectorAll('.sb-nav-item').forEach(el => {
  el.addEventListener('click', () => switchTab(el.dataset.tab));
});

switchTab('notif');
updateCountdown();
setInterval(updateCountdown, 60 * 60 * 1000);
